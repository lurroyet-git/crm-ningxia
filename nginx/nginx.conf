# =============================================================================
# Nginx 生产环境反向代理配置
# 宁夏CRM作战地图
# 功能：前端静态文件服务、API 代理、WebSocket 代理、Gzip、安全头、HTTPS
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # -------------------- 基础设置 --------------------
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # -------------------- 性能优化 --------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    client_max_body_size 50M;  # 支持上传大文件

    # -------------------- Gzip 压缩 --------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/vnd.geo+json
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/css
        text/plain
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    # -------------------- 安全头 --------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # -------------------- 缓存配置 --------------------
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=STATIC:10m
                     inactive=7d max_size=1g use_temp_path=off;

    # -------------------- 上游服务 --------------------
    upstream backend {
        server crm-backend-prod:3001;
        keepalive 32;
    }

    upstream frontend {
        server crm-frontend-prod:80;
        keepalive 32;
    }

    # =============================================================================
    # HTTP (80) - 重定向到 HTTPS
    # =============================================================================
    server {
        listen 80;
        server_name _;  # 通配，生产环境替换为实际域名

        # 健康检查端点（允许 HTTP 访问）
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # 其余请求重定向到 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =============================================================================
    # HTTPS (443) - 主服务
    # =============================================================================
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL 证书配置（生产环境替换为实际证书路径）
        ssl_certificate /etc/nginx/ssl/crm.crt;
        ssl_certificate_key /etc/nginx/ssl/crm.key;

        # SSL 安全参数
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # -------------------- 前端静态文件 --------------------
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 静态文件缓存
            proxy_cache STATIC;
            proxy_cache_valid 200 7d;
            proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
        }

        # -------------------- API 代理 --------------------
        location /api/ {
            # 去掉 /api 前缀转发到后端（如后端需要去掉前缀）
            # rewrite ^/api/(.*) /$1 break;

            proxy_pass http://backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时设置（支持长耗时 API）
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # 不缓存 API 响应
            proxy_cache_bypass 1;
            proxy_no_cache 1;
        }

        # -------------------- WebSocket 代理（通知服务） --------------------
        location /ws/ {
            proxy_pass http://backend/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # -------------------- 文件上传服务 --------------------
        location /upload/ {
            proxy_pass http://backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 100M;  # 上传文件大小限制
        }

        # -------------------- Swagger API 文档 --------------------
        location /api-docs {
            proxy_pass http://backend/api-docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
